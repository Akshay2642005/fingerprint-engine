[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "fingerprint-sdk"
version = "0.1.0"
description = "Fingerprint Engine — native fingerprint matching SDK"
authors = [{ name = "Fingerprint Engine Contributors" }]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.9"
keywords = ["fingerprint", "browser-fingerprinting", "security"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

[project.urls]
Homepage = "https://github.com/your-org/fingerprint-engine"
Source = "https://github.com/your-org/fingerprint-engine"

[tool.setuptools.packages.find]
where = ["src"]
