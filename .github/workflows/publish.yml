# Fingerprint Engine — Publish to npm (Trusted Publisher)
#
# Triggered by tags matching v* (e.g., v0.1.2).
# Uses npm Trusted Publishers (OIDC) — no token required.
#
# Prerequisite: Configure a trusted publisher on npmjs.com:
#   Package: @akshay2642005/fingerprint-sdk
#   Settings → Trusted Publisher → Add GitHub Actions
#   Owner:   Akshay2642005
#   Repo:    fingerprint-engine
#   Workflow: publish.yml

name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write   # Required for OIDC trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Build WASM + npm package
        run: |
          cd packages/browser
          npm ci
          npm run build

      - name: Publish to npm with provenance
        run: |
          cd packages/browser
          npm publish --provenance
