# Fingerprint Engine — CI Pipeline
#
# Runs on pushes to master and PRs targeting master.
# Verifies compilation, unit tests, WASM build, and native library build
# across Linux, macOS, and Windows.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  ZIG_VERSION: 0.16.0
  # Node 20 deprecation: GitHub runners use Node 24 by default
  # These actions work fine on Node 24 despite the deprecation warnings
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Show Zig version
        run: zig version

      - name: Run unit tests
        run: zig build test --summary all

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build WASM module
        run: zig build wasm

      - name: Verify WASM output exists
        run: |
          if [ -f zig-out/bin/fingerprint.wasm ]; then
            echo "✅ WASM binary found: $(ls -lh zig-out/bin/fingerprint.wasm | awk '{print $5}')"
          else
            echo "❌ WASM binary not found"
            exit 1
          fi

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: fingerprint-wasm
          path: zig-out/bin/fingerprint.wasm
          retention-days: 30

  native-build:
    name: Native Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build native static library
        run: |
          zig version
          zig build native
          echo "=== zig-out check ==="
          ls -la zig-out/ 2>/dev/null || echo "no zig-out dir"
          ls -la zig-out/lib/ 2>/dev/null || echo "no zig-out/lib dir"
          find . -name "*.a" -o -name "*.lib" 2>/dev/null | head -5

      - name: Verify native library output exists
        shell: bash
        run: |
          # Library naming convention:
          #   Linux/macOS: libfingerprint.a
          #   Windows:     fingerprint.lib
          FOUND=$(ls zig-out/lib/libfingerprint.* zig-out/lib/fingerprint.* 2>/dev/null | head -1)
          if [ -n "$FOUND" ]; then
            echo "✅ Native library found: $FOUND"
          else
            echo "❌ Native library not found"
            exit 1
          fi

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: fingerprint-native-${{ matrix.os }}
          path: zig-out/lib/
          retention-days: 30
