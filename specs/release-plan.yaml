# Release Plan — Fingerprint Engine
target_version: 0.2.0

releases:
  v0.1.1:
    status: released
    date: "2026-07-11"
    epics:
      - scratch-buffer-fix
      - docs-corrections
      - version-bump
    summary: |
      Bug fix release. Fixes WASM scratch buffer corruption (string/bytes features
      crashed with unreachable). Corrects docs (37 → 102 signals). Fixes UMD
      template, package URLs, and version consistency.

  v0.1.0:
    status: released
    date: "2026-07-11"
    epics:
      - e01-core-engine
      - e02-browser-sdk
      - e03-server-sdk
      - e04-integration-quality
    summary: |
      MVP release. Core engine (9 modules), browser WASM SDK with 11 collectors,
      server C ABI, TypeScript bindings, CI/CD pipelines, npm package.

